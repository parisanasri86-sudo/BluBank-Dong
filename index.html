  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n<a class=\"snav\" data-spy=\"#synthesis\" href=\"#synthesis\"><span class=\"slabel\">Synthesis<\u002Fspan><span class=\"sdot\"><\u002Fspan><\u002Fa>\n<a class=\"snav\" data-spy=\"#next\" href=\"#next\"><span class=\"slabel\">What's Next<\u002Fspan><span class=\"sdot\"><\u002Fspan><\u002Fa>\n<\u002Fnav>\n\n<section id=\"top\" class=\"sec\" data-screen-label=\"Hero\" style=\"padding-top:84px\">\n<div class=\"wrap\">\n<div style=\"display:grid;grid-template-columns:minmax(0,1.08fr) minmax(0,.92fr);gap:44px;align-items:center\">\n<div class=\"rv\">\n<div class=\"herolock\"><img class=\"herologo\" src=\"13dcfcbf-38ff-4aed-b639-5ed46d06687d\" alt=\"BluBank logo\" data-comment-anchor=\"ae19bba506-img\"><span class=\"lbl\" style=\"margin-bottom:0\">UX Research Case Study · Dong<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">Improving the <span style=\"color:var(--blu)\">Shared Money Hub<\u002Fspan> for BluBank<\u002Fh1>\n<p class=\"lead\" style=\"max-width:54ch\">A UX research case study on <b style=\"color:var(--text);font-weight:600\">Dong<\u002Fb> <span class=\"fa muted\" style=\"font-size:15px\">(دنگ)<\u002Fspan> — BluBank's group expense-splitting feature.<\u002Fp>\n<div style=\"margin-top:24px;display:flex;flex-wrap:wrap;gap:9px\">\n<span class=\"pill\"><span class=\"pd\"><\u002Fspan>4 Designers<\u002Fspan>\n<span class=\"pill\">Desk Research<\u002Fspan>\n<span class=\"pill\">User Interviews<\u002Fspan>\n<span class=\"pill\">Heuristic Evaluation<\u002Fspan>\n<span class=\"pill\" style=\"color:var(--success);border-color:rgba(52,211,153,.25)\">Jun 2026 · Research Phase<\u002Fspan>\n<\u002Fdiv>\n<div style=\"margin-top:20px;font-size:13.5px;color:var(--dim)\">Parisa Nasri · Farnaz Toghiani · Mahdis Salaari · Arin Hacoupian<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rv heromock\" data-d=\"120\" style=\"position:relative;min-height:430px;display:flex;align-items:center;justify-content:center\">\n<div class=\"glow\" style=\"width:300px;height:300px;background:radial-gradient(circle,var(--blu),transparent 68%);opacity:.34\"><\u002Fdiv>\n<div data-parallax=\"0.04\" data-rot=\"rotate(5deg) translateX(34px)\" style=\"position:relative;z-index:1;transform:rotate(5deg) translateX(34px)\"><div class=\"phone\" style=\"animation:figfloat 7s ease-in-out infinite\"><img src=\"4d72c0e7-8a18-4e85-acc7-5b22fd960311\" alt=\"Dong summary screen\"><\u002Fdiv><\u002Fdiv>\n<div data-parallax=\"0.08\" data-rot=\"rotate(-5deg) translateX(-30px)\" style=\"position:relative;z-index:2;margin-left:-58px;transform:rotate(-5deg) translateX(-30px)\"><div class=\"phone\" style=\"border-color:rgba(126,179,245,.35);box-shadow:0 44px 80px -26px rgba(0,0,0,.85),0 0 0 1px rgba(126,179,245,.12);animation:figfloat 7s ease-in-out infinite .7s\"><img src=\"37e64470-afda-4044-be95-769bbfd0e9e8\" alt=\"Dong transactions screen\" data-comment-anchor=\"9a0ace955f-img\"><\u002Fdiv><\u002Fdiv>\n<div class=\"figcur\" style=\"--cc:#7EB3F5;top:8%;left:52%\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\" style=\"color:#7EB3F5\"><path d=\"M4.5 2.2 L19.5 11.3 L12.4 12.6 L9.6 19.8 Z\"><\u002Fpath><\u002Fsvg><span class=\"figpill\">Parisa<\u002Fspan><\u002Fdiv>\n<div class=\"figcur\" style=\"--cc:#E05A7A;top:58%;left:26%;animation-delay:-2.4s\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\" style=\"color:#E05A7A\"><path d=\"M4.5 2.2 L19.5 11.3 L12.4 12.6 L9.6 19.8 Z\"><\u002Fpath><\u002Fsvg><span class=\"figpill\">Farnaz<\u002Fspan><\u002Fdiv>\n<div class=\"figcur\" style=\"--cc:#34D399;top:74%;left:66%;animation-delay:-4.1s\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\" style=\"color:#34D399\"><path d=\"M4.5 2.2 L19.5 11.3 L12.4 12.6 L9.6 19.8 Z\"><\u002Fpath><\u002Fsvg><span class=\"figpill\">Mahdis<\u002Fspan><\u002Fdiv>\n<div class=\"figcur\" style=\"--cc:#F5B97E;top:32%;left:74%;animation-delay:-1.2s\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\" style=\"color:#F5B97E\"><path d=\"M4.5 2.2 L19.5 11.3 L12.4 12.6 L9.6 19.8 Z\"><\u002Fpath><\u002Fsvg><span class=\"figpill\">Arin<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"context\" class=\"sec\" data-screen-label=\"Product Overview\">\n<div class=\"wrap\">\n<div class=\"rv\" style=\"margin-bottom:30px;max-width:74ch\">\n<span class=\"lbl\">Product overview<\u002Fspan>\n<h2 class=\"h2\">What is Dong?<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:14px\">BluBank is Iran's digital-only neobank. <b style=\"color:var(--text);font-weight:600\">Dong<\u002Fb> <span class=\"fa muted\" style=\"font-size:14px\">(دنگ)<\u002Fspan> is its in-app feature for splitting group expenses — letting friends, housemates, and travel groups track who paid for what and settle up.<\u002Fp>\n<\u002Fdiv>\n<div class=\"rv grid4\" data-d=\"60\">\n<div class=\"card\"><div class=\"stat\" data-count=\"2019\">2019<\u002Fdiv><div class=\"statlbl\">Founded<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"stat\" style=\"font-size:30px;line-height:1.3\">Saman Bank<\u002Fdiv><div class=\"statlbl\">Parent company<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"stat\" style=\"color:var(--blu)\"><span data-count=\"10\" data-prefix=\"+\" data-suffix=\"M\">+10M<\u002Fspan><\u002Fdiv><div class=\"statlbl\">Users<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"stat\"><span data-count=\"700\" data-prefix=\"+\">+700<\u002Fspan><\u002Fdiv><div class=\"statlbl\">Employees<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"scope\" class=\"sec\" data-screen-label=\"Feature Scope\">\n<div class=\"wrap\">\n<div class=\"rv\" style=\"margin-bottom:30px;max-width:72ch\">\n<span class=\"lbl\" style=\"color:var(--danger)\">Feature scope<\u002Fspan>\n<h2 class=\"h2\">Dong's Constraints<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:14px\">Six hard limits define what Dong can and can't do — and each one shows up later as a recurring source of user friction.<\u002Fp>\n<\u002Fdiv>\n<div class=\"grid3\">\n<div class=\"rv cons\"><span class=\"ico\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">BluBank account required<\u002Fspan><span class=\"cd\">All group members must have a BluBank account to participate.<\u002Fspan><\u002Fdiv>\n<div class=\"rv cons\" data-d=\"50\"><span class=\"ico\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">Equal or manual split only<\u002Fspan><span class=\"cd\">No percentage-based or automatic smart splitting.<\u002Fspan><\u002Fdiv>\n<div class=\"rv cons\" data-d=\"100\"><span class=\"ico\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">No receipt or image upload<\u002Fspan><span class=\"cd\">Users cannot attach photos of bills or invoices to transactions.<\u002Fspan><\u002Fdiv>\n<div class=\"rv cons\"><span class=\"ico\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">Per-transaction reminders only<\u002Fspan><span class=\"cd\">No automatic, scheduled, or aggregated debt reminders.<\u002Fspan><\u002Fdiv>\n<div class=\"rv cons\" data-d=\"50\"><span class=\"ico\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">No comments or notes<\u002Fspan><span class=\"cd\">Members can't add descriptions, notes, or communicate within the feature.<\u002Fspan><\u002Fdiv>\n<div class=\"rv cons\" data-d=\"100\"><span class=\"ico\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fspan><span class=\"ct\">Locked after partial payment<\u002Fspan><span class=\"cd\">Once any member pays their share, the whole transaction becomes uneditable — even for those who haven't paid.<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rv\" data-d=\"80\" style=\"margin-top:34px\">\n<span class=\"lbl\" style=\"color:var(--dim);margin-bottom:18px\">Research approach · three methods, one question<\u002Fspan>\n<div class=\"grid3\">\n<div class=\"mcard\"><span class=\"top\" style=\"background:var(--slate)\"><\u002Fspan><span class=\"mbadge mb-desk\"><span class=\"mn\">01<\u002Fspan>Desk Research<\u002Fspan><p class=\"mcap\" style=\"margin-top:16px\">Goal<\u002Fp><p class=\"mtxt\">Map the market landscape and surface existing user pain points.<\u002Fp><p class=\"mcap\">Output<\u002Fp><p class=\"mtxt\" style=\"margin-bottom:0\">User voice from 50+ app-store reviews.<\u002Fp><\u002Fdiv>\n<div class=\"mcard\"><span class=\"top\" style=\"background:var(--teal)\"><\u002Fspan><span class=\"mbadge mb-int\"><span class=\"mn\">02<\u002Fspan>User Interviews<\u002Fspan><p class=\"mcap\" style=\"margin-top:16px\">Goal<\u002Fp><p class=\"mtxt\">Understand real behavior, motivations, and unmet needs.<\u002Fp><p class=\"mcap\">Output<\u002Fp><p class=\"mtxt\" style=\"margin-bottom:0\" data-comment-anchor=\"053b417653-p\">Coded insights from 4 in-depth conversations.<\u002Fp><\u002Fdiv>\n<div class=\"mcard\"><span class=\"top\" style=\"background:var(--purple)\"><\u002Fspan><span class=\"mbadge mb-heur\"><span class=\"mn\">03<\u002Fspan>Heuristic Eval<\u002Fspan><p class=\"mcap\" style=\"margin-top:16px\">Goal<\u002Fp><p class=\"mtxt\">Evaluate the UI against established usability standards.<\u002Fp><p class=\"mcap\">Output<\u002Fp><p class=\"mtxt\" style=\"margin-bottom:0\">85 checks across Nielsen's 10 heuristics.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"band band-desk\">\n<section id=\"desk\" class=\"sec\" data-screen-label=\"Desk Research\">\n<div class=\"wrap\">\n<div class=\"rv\" style=\"margin-bottom:30px\">\n<span class=\"mbadge mb-desk\" style=\"margin-bottom:18px\"><span class=\"mn\">Method 01<\u002Fspan>Desk Research<\u002Fspan>\n<h2 class=\"h2\">Top User Frustrations<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:14px;max-width:60ch\">The loudest, most repeated complaints across Iran's app stores — Myket, Cafe Bazaar, and Koocheh.<\u002Fp>\n<\u002Fdiv>\n<div class=\"grid3\">\n<article class=\"rv chart sevcard\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\"><span class=\"sevbadge sb-high\">High<\u002Fspan><\u002Fdiv><h3 class=\"h3\">Lack of Smart Debt Reminders<\u002Fh3><p class=\"mtxt\" style=\"margin:10px 0 8px\" data-comment-anchor=\"3c1ef55ce7-p\">Users forget to settle debts — there are no automatic or scheduled reminders.<\u002Fp><div class=\"frow\" style=\"--w:90%\"><div class=\"ffill\" style=\"background:var(--danger)\"><\u002Fdiv><\u002Fdiv><\u002Farticle>\n<article class=\"rv chart sevcard\" data-d=\"70\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\"><span class=\"sevbadge sb-high\">High<\u002Fspan><\u002Fdiv><h3 class=\"h3\">No Receipt Intelligence<\u002Fh3><p class=\"mtxt\" style=\"margin:10px 0 8px\" data-comment-anchor=\"57730a553e-p\">Manual entry is time-consuming and prone to errors.<\u002Fp><div class=\"frow\" style=\"--w:85%\"><div class=\"ffill\" style=\"background:var(--danger)\" data-comment-anchor=\"64026e6311-div\"><\u002Fdiv><\u002Fdiv><\u002Farticle>\n<article class=\"rv chart sevcard\" data-d=\"140\"><div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\"><span class=\"sevbadge sb-med\">Medium<\u002Fspan><\u002Fdiv><h3 class=\"h3\">Requirement to Have a Blu Account<\u002Fh3><p class=\"mtxt\" style=\"margin:10px 0 8px\" data-comment-anchor=\"81d6b9c13c-p\">Users in the network outside BluBank face barriers to participate.<\u002Fp><div class=\"frow\" style=\"--w:58%\"><div class=\"ffill\" style=\"background:var(--amber)\"><\u002Fdiv><\u002Fdiv><\u002Farticle>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n\n<div class=\"band band-int\">\n<section id=\"interviews\" class=\"sec\" data-screen-label=\"User Interviews\">\n<div class=\"wrap\">\n<div class=\"rv\" style=\"margin-bottom:32px;max-width:84ch\">\n<span class=\"mbadge mb-int\" style=\"margin-bottom:18px\"><span class=\"mn\">Method 02<\u002Fspan>User Interviews<\u002Fspan>\n<h2 class=\"h2\">What We Heard From Users<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:14px\" data-comment-anchor=\"841203f8eb-p\">Four in-depth, remote conversations with active Dong users. We grouped their words into recurring themes — each one maps directly onto a constraint and a heuristic gap.<\u002Fp>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n<div class=\"rv qtheme\"><h3 class=\"qttl\">\"Half the work happens outside the app\"<\u002Fh3><p class=\"qins\">Communication, calculation, and coordination all break out of Dong into external tools.<\u002Fp><div class=\"quote\"><p class=\"qt\">\"If I want to leave a comment, I have to say it outside the app.\"<\u002Fp><span class=\"qw\">— Mahnaz<\u002Fspan><\u002Fdiv><div class=\"quote\"><p class=\"qt\">\"Practically half the work ended up happening outside the app.\"<\u002Fp><span class=\"qw\">— Arman<\u002Fspan><\u002Fdiv><div class=\"quote\"><p class=\"qt\">\"I wish discussions related to Blu could happen inside the app.\"<\u002Fp><span class=\"qw\">— Aram<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"rv qtheme\" data-d=\"60\"><h3 class=\"qttl\">\"No proof, no trust\"<\u002Fh3><p class=\"qins\">Without receipts or notes, members can't verify expenses — creating social friction.<\u002Fp><div class=\"quote\"><p class=\"qt\">\"If I could upload a receipt, it would be so much better.\"<\u002Fp><span class=\"qw\">— Aram<\u002Fspan><\u002Fdiv><div class=\"quote\"><p class=\"qt\">\"If I could upload a receipt, it would be so much better.\"<\u002Fp><span class=\"qw\">— Fereshteh<\u002Fspan><\u002Fdiv><div class=\"quote\"><p class=\"qt\">\"There's no option to write any description.\"<\u002Fp><span class=\"qw\">— Mahnaz<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"rv qtheme\"><h3 class=\"qttl\">\"The math shouldn't be my job\"<\u002Fh3><p class=\"qins\">Manual splitting forces users into error-prone external calculations.<\u002Fp><div class=\"quote\"><p class=\"qt\">\"I have to manually enter unequal expenses myself.\"<\u002Fp><span class=\"qw\">— Fereshteh<\u002Fspan><\u002Fdiv><div class=\"quote\"><p class=\"qt\">\"Last time we just calculated everything manually between ourselves.\"<\u002Fp><span class=\"qw\">— Mahnaz<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"rv qtheme\" data-d=\"60\"><h3 class=\"qttl\">\"Reminders that don't remind\"<\u002Fh3><p class=\"qins\">The reminder feature exists but fails to close the loop — no automation, no confirmation.<\u002Fp><div class=\"quote\"><p class=\"qt\">\"I tap the reminder button, but it doesn't seem to work.\"<\u002Fp><span class=\"qw\">— Fereshteh<\u002Fspan><\u002Fdiv><div class=\"quote\"><p class=\"qt\">\"It'd be better if a notification just went out automatically.\"<\u002Fp><span class=\"qw\">— Aram<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"rv qtheme\"><h3 class=\"qttl\">\"Everyone has to be in Blu\"<\u002Fh3><p class=\"qins\">The closed ecosystem blocks the most common real-world scenario — mixed groups.<\u002Fp><div class=\"quote\"><p class=\"qt\">\"Allowing people outside BluBank to join the group.\"<\u002Fp><span class=\"qw\">— Recurring across interviews &amp; app-store reviews<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"rv qtheme\" data-d=\"60\"><h3 class=\"qttl\">\"I can't find what I already paid\"<\u002Fh3><p class=\"qins\">No payment history, calendar view, or searchable records inside Dong.<\u002Fp><div class=\"quote\"><p class=\"qt\">\"If it had a calendar too, and I could search payments through it — that would be great.\"<\u002Fp><span class=\"qw\">— Fereshteh<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n\n<div class=\"band band-heur\">\n<section id=\"heuristics\" class=\"sec\" data-screen-label=\"Heuristic Evaluation\">\n<div class=\"wrap\">\n<div class=\"rv\" style=\"margin-bottom:30px;max-width:74ch\">\n<span class=\"mbadge mb-heur\" style=\"margin-bottom:18px\"><span class=\"mn\">Method 03<\u002Fspan>Heuristic Evaluation<\u002Fspan>\n<h2 class=\"h2\">Measuring the UI Against Standards<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:14px\" data-comment-anchor=\"85b78cb145-p\">85 check questions across Nielsen's 10 usability heuristics, each issue rated on the 0–4 severity scale.<\u002Fp>\n<\u002Fdiv>\n<div class=\"rv grid4\" data-d=\"40\" style=\"margin-bottom:30px\">\n<div class=\"card\"><div class=\"stat\" style=\"color:var(--purple)\" data-count=\"85\" data-comment-anchor=\"6c7624d2a4-div\">85<\u002Fdiv><div class=\"statlbl\">Check questions<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"stat\" data-count=\"48\" data-suffix=\"%\">48%<\u002Fdiv><div class=\"statlbl\">Overall pass rate<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"stat\" data-count=\"1\">1<\u002Fdiv><div class=\"statlbl\">Evaluator<\u002Fdiv><\u002Fdiv>\n<div class=\"card\"><div class=\"stat\">0–4<\u002Fdiv><div class=\"statlbl\">Severity scale (Nielsen)<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"rv chart card\" style=\"margin-bottom:16px\">\n<div style=\"display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px\"><h3 class=\"h3\">Priority Score by Heuristic<\u002Fh3><span class=\"foot\">Issues × average severity · sorted by priority<\u002Fspan><\u002Fdiv>\n<p class=\"foot\" style=\"margin:0 0 18px\">One heuristic dominates everything else — H7 Flexibility &amp; Efficiency.<\u002Fp>\n<div class=\"bar\"><span class=\"blabel\"><b>H7<\u002Fb> · Flexibility &amp; Efficiency<\u002Fspan><div class=\"btrack\" style=\"--w:100%\"><div class=\"bfill bf-crit\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">37.1<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H10<\u002Fb> · Help &amp; Documentation<\u002Fspan><div class=\"btrack\" style=\"--w:21.6%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">8.0<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H3<\u002Fb> · User Control &amp; Freedom<\u002Fspan><div class=\"btrack\" style=\"--w:16.2%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">6.0<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H1<\u002Fb> · Visibility of System Status<\u002Fspan><div class=\"btrack\" style=\"--w:13.5%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">5.0<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H5<\u002Fb> · Error Prevention<\u002Fspan><div class=\"btrack\" style=\"--w:12.1%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">4.5<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H9<\u002Fb> · Error Recovery<\u002Fspan><div class=\"btrack\" style=\"--w:10.2%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">3.8<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H8<\u002Fb> · Aesthetic &amp; Minimalist<\u002Fspan><div class=\"btrack\" style=\"--w:4%\"><div class=\"bfill bf-blu\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">1.5<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H2<\u002Fb> · Match System &amp; Real World<\u002Fspan><div class=\"btrack\" style=\"--w:2.2%\"><div class=\"bfill bf-blu\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">0.8<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H6<\u002Fb> · Recognition Not Recall<\u002Fspan><div class=\"btrack\" style=\"--w:1%\"><div class=\"bfill bf-blu\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">0.3<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H4<\u002Fb> · Consistency &amp; Standards<\u002Fspan><div class=\"btrack\" style=\"--w:0.6%\"><div class=\"bfill bf-blu\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">0.0<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"grid2\">\n<div class=\"rv chart card\">\n<h3 class=\"h3\" style=\"margin-bottom:4px\">Severity Distribution<\u002Fh3>\n<p class=\"foot\" style=\"margin:0 0 18px\">85 checks rated 0 (no problem) to 4 (catastrophic).<\u002Fp>\n<div class=\"bar\"><span class=\"blabel\"><b>0<\u002Fb> · Not a Problem<\u002Fspan><div class=\"btrack\" style=\"--w:100%\"><div class=\"bfill bf-good\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">30<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>1<\u002Fb> · Cosmetic<\u002Fspan><div class=\"btrack\" style=\"--w:26.7%\"><div class=\"bfill bf-slate\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">8<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>2<\u002Fb> · Minor<\u002Fspan><div class=\"btrack\" style=\"--w:36.7%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">11<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>3<\u002Fb> · Major<\u002Fspan><div class=\"btrack\" style=\"--w:70%\"><div class=\"bfill\" style=\"background:linear-gradient(90deg,#E0915A,#EE8B5B)\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">21<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>4<\u002Fb> · Catastrophic<\u002Fspan><div class=\"btrack\" style=\"--w:6.7%\"><div class=\"bfill bf-crit\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">2<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rv chart card\" data-d=\"80\">\n<h3 class=\"h3\" style=\"margin-bottom:4px\">Pass Rate by Heuristic<\u002Fh3>\n<p class=\"foot\" style=\"margin:0 0 18px\">Share of checks passed within each heuristic.<\u002Fp>\n<div class=\"bar\"><span class=\"blabel\"><b>H1<\u002Fb> Visibility<\u002Fspan><div class=\"btrack\" style=\"--w:44%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">44%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H2<\u002Fb> Real World<\u002Fspan><div class=\"btrack\" style=\"--w:60%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">60%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H3<\u002Fb> Control<\u002Fspan><div class=\"btrack\" style=\"--w:33%\"><div class=\"bfill bf-crit\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">33%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H4<\u002Fb> Consistency<\u002Fspan><div class=\"btrack\" style=\"--w:100%\"><div class=\"bfill bf-good\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">100%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H5<\u002Fb> Error Prev.<\u002Fspan><div class=\"btrack\" style=\"--w:50%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">50%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H6<\u002Fb> Recognition<\u002Fspan><div class=\"btrack\" style=\"--w:83%\"><div class=\"bfill bf-good\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">83%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H7<\u002Fb> Flexibility<\u002Fspan><div class=\"btrack\" style=\"--w:12%\"><div class=\"bfill bf-crit\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">12%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H8<\u002Fb> Aesthetic<\u002Fspan><div class=\"btrack\" style=\"--w:50%\"><div class=\"bfill bf-amber\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">50%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H9<\u002Fb> Recovery<\u002Fspan><div class=\"btrack\" style=\"--w:25%\"><div class=\"bfill bf-crit\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">25%<\u002Fspan><\u002Fdiv>\n<div class=\"bar\"><span class=\"blabel\"><b>H10<\u002Fb> Help &amp; Docs<\u002Fspan><div class=\"btrack\" style=\"--w:20%\"><div class=\"bfill bf-crit\"><\u002Fdiv><\u002Fdiv><span class=\"bval\">20%<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rv\" data-d=\"60\" style=\"margin-top:18px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px\">\n<div class=\"legend\"><span class=\"lg\"><span class=\"lgd bf-crit\"><\u002Fspan>Critical / failing<\u002Fspan><span class=\"lg\"><span class=\"lgd bf-amber\"><\u002Fspan>Partial<\u002Fspan><span class=\"lg\"><span class=\"lgd bf-good\"><\u002Fspan>Passing<\u002Fspan><\u002Fdiv>\n<a class=\"cta\" href=\"https://docs.google.com/spreadsheets/d/1DCKncaZY3ZCkVi4_aPZ8cqMMcOk0OTDe/edit?gid=89532273#gid=89532273\" target=\"_blank\" rel=\"noopener\">View Full Evaluation Data<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17 17 7M9 7h8v8\"><\u002Fpath><\u002Fsvg><\u002Fa>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n\n<section id=\"findings\" class=\"sec\" data-screen-label=\"Critical Findings\">\n<div class=\"wrap\">\n<div class=\"rv\" style=\"margin-bottom:30px;max-width:72ch\">\n<span class=\"lbl\" style=\"color:var(--danger)\">Critical findings<\u002Fspan>\n<h2 class=\"h2\">The Problems That Hold Dong Back<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:14px\">Three issues carry the highest real-world cost — each one pushes users out of the app or erodes trust between group members.<\u002Fp>\n<\u002Fdiv>\n<div class=\"grid3\">\n<div class=\"rv imp\"><div class=\"impnum\">01<\u002Fdiv><span class=\"sevtag\">Severity 4<\u002Fspan><h3 class=\"h3\" style=\"margin:16px 0 10px;max-width:18ch\">Mandatory BluBank Account<\u002Fh3><p class=\"mtxt\" style=\"margin:0\">Users must convince every friend and family member to open a BluBank account before splitting a single expense — the highest adoption barrier.<\u002Fp><\u002Fdiv>\n<div class=\"rv imp\" data-d=\"70\"><div class=\"impnum\">02<\u002Fdiv><span class=\"sevtag\">Severity 4<\u002Fspan><h3 class=\"h3\" style=\"margin:16px 0 10px;max-width:18ch\">No Receipt Upload or Scanning<\u002Fh3><p class=\"mtxt\" style=\"margin:0\">Without photo proof of expenses, group members have no verifiable evidence — leading to trust erosion and disputes over amounts.<\u002Fp><\u002Fdiv>\n<div class=\"rv imp\" data-d=\"140\"><div class=\"impnum\">03<\u002Fdiv><span class=\"sevtag s3\">Severity 3<\u002Fspan><h3 class=\"h3\" style=\"margin:16px 0 10px;max-width:20ch\">Transaction Locked After Any Member Pays<\u002Fh3><p class=\"mtxt\" style=\"margin:0\">If one person pays their share and an error is found, the admin can't correct the remaining shares — forcing manual workarounds outside the app.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rv pquote\" data-d=\"60\" style=\"margin-top:26px\">\n<p data-comment-anchor=\"643588a021-p\">Across 85 heuristic checks, 4 user interviews, and many reviews across Iran's app stores, the same three gaps surfaced repeatedly: <b style=\"font-weight:700\">the inability to document expenses<\u002Fb> (no receipts, no notes), <b style=\"font-weight:700\">the burden of manual processes<\u002Fb> (splitting, reminders, calculations), and <b style=\"font-weight:700\">the closed ecosystem<\u002Fb> (BluBank-only participation). These aren't edge cases — they're the core workflow friction that keeps Dong from becoming users' default expense-splitting tool.<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"synthesis\" class=\"sec\" data-screen-label=\"Synthesis\">\n<div class=\"wrap\">\n<div class=\"rv\" style=\"margin-bottom:34px;max-width:72ch\">\n<span class=\"lbl\">Cross-method synthesis<\u002Fspan>\n<h2 class=\"h2\">Where All Three Methods Agree<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:14px\">Desk research, interviews, and the heuristic evaluation converge on the same three problems — the strongest possible signal for what to fix first.<\u002Fp>\n<\u002Fdiv>\n<div class=\"rv venn\" data-d=\"40\" style=\"margin-bottom:40px\">\n<div class=\"vc vc1\"><span>Desk Research<\u002Fspan><\u002Fdiv>\n<div class=\"vc vc2\"><span>Interviews<\u002Fspan><\u002Fdiv>\n<div class=\"vc vc3\"><span>Heuristic Eval<\u002Fspan><\u002Fdiv>\n<div class=\"venncore\">3 shared problems<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rv conv\" data-d=\"60\">\n<div class=\"convrow\"><div class=\"convh\">Problem<\u002Fdiv><div class=\"convh ch-desk\">Desk Research<\u002Fdiv><div class=\"convh ch-int\">Interviews<\u002Fdiv><div class=\"convh ch-heur\">Heuristic Eval<\u002Fdiv><\u002Fdiv>\n<div class=\"convrow\"><div class=\"convcell convp\"><span class=\"nn\">1<\u002Fspan>No receipt / documentation system<\u002Fdiv><div class=\"convcell\">App-store reviews demand it<\u002Fdiv><div class=\"convcell\">3 / 4 interviewees requested it<\u002Fdiv><div class=\"convcell\" data-comment-anchor=\"26f12b22e2-div\">Flexibility gaps rated up to Severity 4<\u002Fdiv><\u002Fdiv>\n<div class=\"convrow\"><div class=\"convcell convp\"><span class=\"nn\">2<\u002Fspan>Manual-only processes (split, reminders, calculations)<\u002Fdiv><div class=\"convcell\">Competitor gap vs Splitwise / Tricount<\u002Fdiv><div class=\"convcell\">4 / 4 experienced this pain<\u002Fdiv><div class=\"convcell\">Multiple flexibility checks failed<\u002Fdiv><\u002Fdiv>\n<div class=\"convrow\"><div class=\"convcell convp\"><span class=\"nn\">3<\u002Fspan>Closed BluBank-only ecosystem<\u002Fdiv><div class=\"convcell\">Top complaint in reviews<\u002Fdiv><div class=\"convcell\">Mentioned across interviews<\u002Fdiv><div class=\"convcell\">Flexibility gap rated Severity 4<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rv pquote\" data-d=\"80\" style=\"margin-top:30px\">\n<span class=\"lbl\" style=\"color:var(--blu)\">Problem statement<\u002Fspan>\n<p>\"Dong users who split expenses with friends and family are forced to manage critical parts of their workflow — calculating shares, documenting costs, and communicating about disputes — outside the app, because the feature lacks receipt support, flexible splitting, and cross-platform access. This fragmentation erodes trust between group members and creates enough friction that users abandon the feature for manual methods.\"<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"next\" class=\"sec\" data-screen-label=\"What's Next\">\n<div class=\"wrap\">\n<div class=\"rv\" style=\"margin-bottom:30px;max-width:72ch\">\n<span class=\"lbl\" style=\"color:var(--success)\">What's next<\u002Fspan>\n<h2 class=\"h2\">From Research to Design<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:14px\">This is a research-phase case study — no solutions have been designed yet. The three convergent problems define the priority areas for the design phase that follows.<\u002Fp>\n<\u002Fdiv>\n<div class=\"grid3\">\n<div class=\"rv nextcard\"><span class=\"nextn\">Priority 01<\u002Fspan><h3 class=\"h3\">Documentation system<\u002Fh3><p class=\"mtxt\" style=\"margin:0\">Explore receipt upload / scanning and per-transaction notes so expenses become verifiable inside the app.<\u002Fp><\u002Fdiv>\n<div class=\"rv nextcard\" data-d=\"70\"><span class=\"nextn\">Priority 02<\u002Fspan><h3 class=\"h3\">Automate the manual<\u002Fh3><p class=\"mtxt\" style=\"margin:0\">Flexible splitting, automatic calculations, and scheduled reminders to take the busywork off users.<\u002Fp><\u002Fdiv>\n<div class=\"rv nextcard\" data-d=\"140\"><span class=\"nextn\">Priority 03<\u002Fspan><h3 class=\"h3\">Open the ecosystem<\u002Fh3><p class=\"mtxt\" style=\"margin:0\">Investigate ways for non-BluBank members to participate, removing the single biggest adoption barrier.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rv\" data-d=\"60\" style=\"margin-top:30px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px;padding-top:28px;border-top:1px solid var(--line)\">\n<div style=\"display:flex;align-items:center;gap:11px\"><img src=\"13dcfcbf-38ff-4aed-b639-5ed46d06687d\" alt=\"\" style=\"width:26px;height:26px;border-radius:7px\"><div><div style=\"font-weight:700;font-size:14px\">blu<span style=\"color:var(--blu)\">Bank<\u002Fspan> · Shared Money Hub<\u002Fdiv><div class=\"foot\">Parisa Nasri · Farnaz Toghiani · Mahdis Salaari · Arin Hacoupian — Jun 2026<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<a class=\"cta\" href=\"https://docs.google.com/spreadsheets/d/1DCKncaZY3ZCkVi4_aPZ8cqMMcOk0OTDe/edit?gid=89532273#gid=89532273\" target=\"_blank\" rel=\"noopener\">View Full Evaluation Data<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M7 17 17 7M9 7h8v8\"><\u002Fpath><\u002Fsvg><\u002Fa>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:860},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#7EB3F5&quot;,&quot;options&quot;:[&quot;#7EB3F5&quot;,&quot;#A78BFA&quot;,&quot;#5EE0C8&quot;,&quot;#F5B97E&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;compactNav&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Navigation&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return { rootRef: (el) => { this._root = el; } };\n  }\n  componentDidMount() { this._apply(); this._init(); }\n  componentDidUpdate() { this._apply(); }\n  _apply() {\n    const root = this._root; if (!root) return;\n    root.style.setProperty('--blu', this.props.accent || '#7EB3F5');\n    root.classList.toggle('reduce', !!this.props.reduceMotion);\n    root.classList.toggle('compact', !!this.props.compactNav);\n  }\n  _init() {\n    const root = this._root; if (!root || this._ready) return;\n    this._ready = true;\n    const prog = root.querySelector('[data-progress]');\n    const onScroll = () => {\n      const max = document.documentElement.scrollHeight - window.innerHeight;\n      const p = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;\n      if (prog) prog.style.width = (p * 100) + '%';\n      if (!this.props.reduceMotion) {\n        root.querySelectorAll('[data-parallax]').forEach((el) => {\n          const s = parseFloat(el.dataset.parallax) || 0.05;\n          const r = el.getBoundingClientRect();\n          const center = r.top + r.height / 2 - window.innerHeight / 2;\n          el.style.transform = (el.dataset.rot || '') + ' translateY(' + (center * s * -1) + 'px)';\n        });\n      }\n    };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    window.addEventListener('resize', onScroll);\n    onScroll();\n    this._onScroll = onScroll;\n    root.classList.add('reveal-on');\n    const fire = (t) => {\n      if (t.classList.contains('chart')) t.classList.add('grow');\n      if (t.classList.contains('rv')) {\n        if (t.dataset.d) t.style.transitionDelay = parseInt(t.dataset.d, 10) + 'ms';\n        t.classList.add('in');\n      }\n      if (t.hasAttribute('data-count')) this._count(t);\n      t.querySelectorAll('[data-count]').forEach((c) => this._count(c));\n    };\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) { fire(e.target); io.unobserve(e.target); } });\n    }, { threshold: 0.12, rootMargin: '0px 0px -5% 0px' });\n    Array.prototype.slice.call(root.querySelectorAll('.rv,.chart')).forEach((el) => {\n      const r = el.getBoundingClientRect();\n      if (r.top < window.innerHeight * 0.96 && r.bottom > 0) fire(el);\n      else io.observe(el);\n    });\n    this._io = io;\n    const links = Array.prototype.slice.call(root.querySelectorAll('[data-spy]'));\n    const spy = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          const id = '#' + e.target.id;\n          links.forEach((a) => a.classList.toggle('on', a.dataset.spy === id));\n        }\n      });\n    }, { rootMargin: '-46% 0px -50% 0px', threshold: 0 });\n    root.querySelectorAll('section[id]').forEach((s) => spy.observe(s));\n    this._spy = spy;\n  }\n  _count(el) {\n    if (el._done) return; el._done = true;\n    const raw = el.dataset.count;\n    const target = parseFloat(raw) || 0;\n    const pre = el.dataset.prefix || '';\n    const suf = el.dataset.suffix || '';\n    const isFloat = String(raw).indexOf('.') >= 0;\n    if (this.props.reduceMotion) { el.textContent = pre + raw + suf; return; }\n    const dur = 1200, start = performance.now();\n    const tick = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      const v = target * e;\n      el.textContent = pre + (isFloat ? v.toFixed(1) : Math.round(v)) + suf;\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n  componentWillUnmount() {\n    if (this._onScroll) { window.removeEventListener('scroll', this._onScroll); window.removeEventListener('resize', this._onScroll); }\n    if (this._io) this._io.disconnect();\n    if (this._spy) this._spy.disconnect();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
