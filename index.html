document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iew\">Overview<\u002Fa>\n<a class=\"navlink\" data-navlink=\"\" href=\"#desk\">Desk Research<\u002Fa>\n<a class=\"navlink\" data-navlink=\"\" href=\"#interviews\" data-comment-anchor=\"4185492299-a\">Interviews<\u002Fa>\n<a class=\"navlink\" data-navlink=\"\" href=\"#heuristics\">Heuristics<\u002Fa>\n<a class=\"navlink\" data-navlink=\"\" href=\"#synthesis\">Synthesis<\u002Fa>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fnav>\n<div aria-hidden=\"true\" style=\"height:52px\"><\u002Fdiv>\n\n<main class=\"wrap\" style=\"padding-bottom:120px\">\n\n<!-- HERO -->\n<section style=\"padding:56px 0 8px\">\n<div style=\"position:relative;display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr);gap:40px;align-items:center\">\n<div data-reveal=\"\">\n<span class=\"lbl\" style=\"color:var(--blu,#7EB3F5)\">UX Research Case Study · Shared Money Hub<\u002Fspan>\n<h1 style=\"font-family:'Inter';font-weight:800;font-size:clamp(34px,4.7vw,54px);line-height:1.05;letter-spacing:-.028em;margin:0 0 20px;max-width:17ch\">Improving the <span style=\"color:var(--blu,#7EB3F5)\">Shared Money Hub<\u002Fspan> for BluBank<\u002Fh1>\n<p class=\"lead\" style=\"font-size:18px;max-width:60ch\">A UX research case study on <b style=\"color:#E7ECF2;font-weight:600\">Dong<\u002Fb> <span class=\"fa muted\" style=\"font-size:15px\">(دنگ)<\u002Fspan> — BluBank's group expense-splitting feature.<\u002Fp>\n<div style=\"margin-top:24px;display:flex;flex-wrap:wrap;gap:9px\">\n<span class=\"pill\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--blu,#7EB3F5)\"><\u002Fspan>4 Designers<\u002Fspan>\n<span class=\"pill\">Desk Research · User Interviews · Heuristic Evaluation<\u002Fspan>\n<span class=\"pill\">Jun 2026<\u002Fspan>\n<span class=\"pill solid\">Research Phase<\u002Fspan>\n<\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"100\" style=\"position:relative;display:flex;justify-content:center;align-items:center;min-height:440px\">\n<div style=\"position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,var(--blu,#7EB3F5) 0%,rgba(126,179,245,0) 68%);filter:blur(20px);opacity:.32;animation:bluPulse 6s ease-in-out infinite\"><\u002Fdiv>\n<div style=\"position:relative;z-index:1;transform:rotate(6deg) translateX(38px);animation:bluFloat 7s ease-in-out infinite\">\n<div style=\"background:#05070A;border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:6px;box-shadow:0 40px 70px -28px rgba(0,0,0,.8)\">\n<img src=\"assets/img-02.png\" alt=\"Transactions screen\" style=\"display:block;width:172px;height:auto;border-radius:27px\">\n<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"position:relative;z-index:2;transform:rotate(-6deg) translateX(-38px);margin-left:-68px;animation:bluFloat 7s ease-in-out infinite .6s\">\n<div style=\"background:#05070A;border:1px solid rgba(126,179,245,.35);border-radius:34px;padding:7px;box-shadow:0 44px 80px -26px rgba(0,0,0,.85),0 0 0 1px rgba(126,179,245,.12)\">\n<img src=\"assets/img-03.png\" alt=\"Shared expense summary screen\" style=\"display:block;width:192px;height:auto;border-radius:28px\">\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"figcur\" style=\"--cc:#7EB3F5;top:0%;left:54%\"><svg class=\"figarrow\" width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\"><path d=\"M4.5 2.2 L19.5 11.3 L12.4 12.6 L9.6 19.8 Z\"><\u002Fpath><\u002Fsvg><span class=\"figpill\">Parisa Nasri<\u002Fspan><\u002Fdiv>\n<div class=\"figcur\" style=\"--cc:#E05A7A;top:20%;left:84%;animation-delay:-1.6s\"><svg class=\"figarrow\" width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\"><path d=\"M4.5 2.2 L19.5 11.3 L12.4 12.6 L9.6 19.8 Z\"><\u002Fpath><\u002Fsvg><span class=\"figpill\">Farnaz Toghiani<\u002Fspan><\u002Fdiv>\n<div class=\"figcur\" style=\"--cc:#34D399;top:75%;left:53%;animation-delay:-3.2s\"><svg class=\"figarrow\" width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\"><path d=\"M4.5 2.2 L19.5 11.3 L12.4 12.6 L9.6 19.8 Z\"><\u002Fpath><\u002Fsvg><span class=\"figpill\">Mahdis Salaari<\u002Fspan><\u002Fdiv>\n<div class=\"figcur\" style=\"--cc:#F59E0B;top:86%;left:82%;animation-delay:-4.8s\"><svg class=\"figarrow\" width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\"><path d=\"M4.5 2.2 L19.5 11.3 L12.4 12.6 L9.6 19.8 Z\"><\u002Fpath><\u002Fsvg><span class=\"figpill\">Arin Hacoupian<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"120\" style=\"margin-top:38px;background:linear-gradient(120deg,rgba(126,179,245,.1),rgba(126,179,245,.02));border:1px solid rgba(126,179,245,.2);border-left:3px solid var(--blu,#7EB3F5);border-radius:12px;padding:24px 28px\">\n<span class=\"lbl\" style=\"color:var(--blu,#7EB3F5);margin-bottom:9px\">The signal<\u002Fspan>\n<p style=\"margin:0;font-size:21px;font-weight:600;line-height:1.42;letter-spacing:-.01em;max-width:74ch\" data-comment-anchor=\"5251e6fa83-p\">Users need a trusted, flexible way to split expenses — but the moment one person pays, Dong locks that expense so its amount can no longer be corrected. Add a Blu-only requirement and manual reminders, and friction shows up at every step.<\u002Fp>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRODUCT CONTEXT -->\n<section id=\"overview\" class=\"sec\">\n<div data-reveal=\"\" style=\"margin-bottom:28px\">\n<span class=\"lbl\">About the product<\u002Fspan>\n<h2 class=\"h2\" style=\"margin-bottom:12px\">What is Dong?<\u002Fh2>\n<p class=\"lead\" style=\"max-width:78ch\">BluBank is Iran's digital-only neobank. <b style=\"color:#E7ECF2;font-weight:600\">Dong<\u002Fb> <span class=\"fa muted\" style=\"font-size:14px\">(دنگ)<\u002Fspan> is its in-app feature for splitting group expenses — letting friends, housemates, and travel groups track who paid for what and settle up.<\u002Fp>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n<div data-reveal=\"\" class=\"card\"><div class=\"stat\">2019<\u002Fdiv><div class=\"muted\" style=\"margin-top:9px;font-size:13.5px\">Founded<\u002Fdiv><\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"60\" class=\"card\"><div class=\"stat\" style=\"font-size:30px;line-height:1.25\">Saman Bank<\u002Fdiv><div class=\"muted\" style=\"margin-top:9px;font-size:13.5px\">Parent company<\u002Fdiv><\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"120\" class=\"card\"><div class=\"stat\" style=\"color:var(--blu,#7EB3F5)\"><span data-count=\"10\" data-prefix=\"+\" data-suffix=\"M\">+10M<\u002Fspan><\u002Fdiv><div class=\"muted\" style=\"margin-top:9px;font-size:13.5px\">Users<\u002Fdiv><\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"180\" class=\"card\"><div class=\"stat\"><span data-count=\"700\" data-prefix=\"+\">+700<\u002Fspan><\u002Fdiv><div class=\"muted\" style=\"margin-top:9px;font-size:13.5px\">Team<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" class=\"card\" style=\"margin-top:16px;background:#11151C\">\n<span class=\"lbl\" style=\"margin-bottom:16px\">Feature scope · Dong constraints<\u002Fspan>\n<div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 26px\">\n<div class=\"cons\"><span class=\"x\">✕<\u002Fspan>Equal or manual-only splits — no percentage<\u002Fdiv>\n<div class=\"cons\"><span class=\"x\">✕<\u002Fspan>Blu-to-Blu payments only<\u002Fdiv>\n<div class=\"cons\"><span class=\"x\">✕<\u002Fspan>No receipt upload<\u002Fdiv>\n<div class=\"cons\"><span class=\"x\">✕<\u002Fspan>Manual-only debt reminders, per transaction<\u002Fdiv>\n<div class=\"cons\"><span class=\"x\">✕<\u002Fspan>Admin role permanently locked to creator<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- RESEARCH OVERVIEW -->\n<section class=\"sec\">\n<div data-reveal=\"\" style=\"margin-bottom:28px\">\n<span class=\"lbl\">Research approach<\u002Fspan>\n<h2 class=\"h2\">Three methods, one question<\u002Fh2>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n<div data-reveal=\"\" class=\"card\">\n<span style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--blu,#7EB3F5);margin-bottom:14px\"><span style=\"width:22px;height:22px;border-radius:6px;background:rgba(126,179,245,.14);display:grid;place-items:center;font-size:12px\">01<\u002Fspan>Desk Research<\u002Fspan>\n<div style=\"font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6B7484;margin-bottom:5px\">Goal<\u002Fdiv>\n<p style=\"margin:0 0 16px;font-size:14px;color:#C2CAD6;line-height:1.55\">Understand the market landscape and existing user pain points.<\u002Fp>\n<div style=\"font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6B7484;margin-bottom:5px\">Output<\u002Fdiv>\n<p style=\"margin:0;font-size:14px;color:#9AA3B4;line-height:1.55\" data-comment-anchor=\"40e0b9870d-p\">User voice from Myket, Cafe Bazaar &amp; Koocheh reviews.<\u002Fp>\n<\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"80\" class=\"card\">\n<span style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#34D399;margin-bottom:14px\"><span style=\"width:22px;height:22px;border-radius:6px;background:rgba(52,211,153,.14);display:grid;place-items:center;font-size:12px\">02<\u002Fspan>User Interviews<\u002Fspan>\n<div style=\"font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6B7484;margin-bottom:5px\">Goal<\u002Fdiv>\n<p style=\"margin:0 0 16px;font-size:14px;color:#C2CAD6;line-height:1.55\">Understand real behavior, motivations, and unmet needs.<\u002Fp>\n<div style=\"font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6B7484;margin-bottom:5px\">Output<\u002Fdiv>\n<p style=\"margin:0;font-size:14px;color:#9AA3B4;line-height:1.55\" data-comment-anchor=\"619c8fa3a7-p\">Coded behavioral insights from in-depth user conversations.<\u002Fp>\n<\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"160\" class=\"card\">\n<span style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#F59E0B;margin-bottom:14px\"><span style=\"width:22px;height:22px;border-radius:6px;background:rgba(245,158,11,.14);display:grid;place-items:center;font-size:12px\">03<\u002Fspan>Heuristic Eval<\u002Fspan>\n<div style=\"font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6B7484;margin-bottom:5px\">Goal<\u002Fdiv>\n<p style=\"margin:0 0 16px;font-size:14px;color:#C2CAD6;line-height:1.55\">Systematically evaluate the UI against usability standards.<\u002Fp>\n<div style=\"font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6B7484;margin-bottom:5px\">Output<\u002Fdiv>\n<p style=\"margin:0;font-size:14px;color:#9AA3B4;line-height:1.55\">66 questions across Nielsen's 10 heuristics.<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" class=\"card\" style=\"margin-top:16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;justify-content:space-between\">\n<span class=\"pill solid\">Week 1 · Desk Research<\u002Fspan>\n<span class=\"muted\">→<\u002Fspan>\n<span class=\"pill solid\">Week 2 · User Interviews<\u002Fspan>\n<span class=\"muted\">→<\u002Fspan>\n<span class=\"pill solid\" data-comment-anchor=\"2b5416e4e6-span\">Week 3 · Heuristic Evaluation<\u002Fspan>\n<span class=\"muted\">→<\u002Fspan>\n<span class=\"pill\" style=\"background:rgba(52,211,153,.12);color:#86E3C2;border-color:rgba(52,211,153,.25)\" data-comment-anchor=\"d0fd7ca6da-span\">Week 4 · Synthesis<\u002Fspan>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- DESK RESEARCH -->\n<section id=\"desk\" class=\"sec\" data-comment-anchor=\"f18045df14-section\">\n<div data-reveal=\"\" style=\"margin-bottom:28px\">\n<span class=\"lbl\">Desk research<\u002Fspan>\n<h2 class=\"h2\">Top User Frustrations<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:10px;max-width:60ch\">From user reviews across Iran's app stores and existing research.<\u002Fp>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n<article data-reveal=\"\" data-sev=\"high\" class=\"card\" style=\"overflow:hidden\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:rgba(224,90,122,.13);color:#E8829B;border:1px solid rgba(224,90,122,.26)\">High<\u002Fspan><span style=\"font-size:18px\">🔔<\u002Fspan><\u002Fdiv>\n<h3 style=\"font-weight:700;font-size:18px;line-height:1.25;margin:0 0 8px\">Lack of Smart Debt Reminders<\u002Fh3>\n<p style=\"font-size:14px;color:#9AA3B4;margin:0 0 18px\">Users forget to settle up — there are no nudges or scheduled reminders.<\u002Fp>\n<div style=\"height:5px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden\"><div style=\"height:100%;width:90%;border-radius:999px;background:#E05A7A\"><\u002Fdiv><\u002Fdiv>\n<\u002Farticle>\n<article data-reveal=\"\" data-reveal-delay=\"70\" data-sev=\"high\" class=\"card\" style=\"overflow:hidden\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:rgba(224,90,122,.13);color:#E8829B;border:1px solid rgba(224,90,122,.26)\">High<\u002Fspan><span style=\"font-size:18px\">📄<\u002Fspan><\u002Fdiv>\n<h3 style=\"font-weight:700;font-size:18px;line-height:1.25;margin:0 0 8px\">No Receipt Intelligence<\u002Fh3>\n<p style=\"font-size:14px;color:#9AA3B4;margin:0 0 18px\">Manual entry is slow and error-prone — receipts can't be scanned or attached.<\u002Fp>\n<div style=\"height:5px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden\"><div style=\"height:100%;width:85%;border-radius:999px;background:#E05A7A\"><\u002Fdiv><\u002Fdiv>\n<\u002Farticle>\n<article data-reveal=\"\" data-sev=\"medium\" class=\"card\" style=\"overflow:hidden\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:rgba(245,158,11,.13);color:#F6B44B;border:1px solid rgba(245,158,11,.26)\">Medium<\u002Fspan><span style=\"font-size:18px\">📊<\u002Fspan><\u002Fdiv>\n<h3 style=\"font-weight:700;font-size:18px;line-height:1.25;margin:0 0 8px\">Weak Group Expense History &amp; Metrics<\u002Fh3>\n<p style=\"font-size:14px;color:#9AA3B4;margin:0 0 18px\">No clear historical view of group spending, and history vanishes after settlement.<\u002Fp>\n<div style=\"height:5px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden\"><div style=\"height:100%;width:55%;border-radius:999px;background:#F59E0B\"><\u002Fdiv><\u002Fdiv>\n<\u002Farticle>\n<article data-reveal=\"\" data-reveal-delay=\"70\" data-sev=\"medium\" class=\"card\" style=\"overflow:hidden\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:rgba(245,158,11,.13);color:#F6B44B;border:1px solid rgba(245,158,11,.26)\">Medium<\u002Fspan><span style=\"font-size:18px\">🔒<\u002Fspan><\u002Fdiv>\n<h3 style=\"font-weight:700;font-size:18px;line-height:1.25;margin:0 0 8px\">Requirement to Have a Blu Account<\u002Fh3>\n<p style=\"font-size:14px;color:#9AA3B4;margin:0 0 18px\">Friends without BluBank can't join a group at all, limiting who can split.<\u002Fp>\n<div style=\"height:5px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden\"><div style=\"height:100%;width:55%;border-radius:999px;background:#F59E0B\"><\u002Fdiv><\u002Fdiv>\n<\u002Farticle>\n<\u002Fdiv>\n\n<div data-reveal=\"\" style=\"margin-top:40px;margin-bottom:18px\">\n<span class=\"lbl\">User voice · store reviews<\u002Fspan>\n<h2 class=\"h2\" style=\"font-size:24px\">What Reviewers Are Saying<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:10px;max-width:62ch\">Real comments pulled from Dong's listings across Iran's app stores.<\u002Fp>\n<\u002Fdiv>\n<div class=\"rvgrid\">\n<div data-reveal=\"\" class=\"rvcard\">\n<div class=\"rvtop\"><span class=\"rvstore\">Myket<\u002Fspan><span class=\"rvstars\">★★★☆☆<\u002Fspan><\u002Fdiv>\n<p class=\"rvq\">\"Good idea, but everyone in the group has to have Blu — most of my friends don't, so we can't even use it.\"<\u002Fp>\n<\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"70\" class=\"rvcard\">\n<div class=\"rvtop\"><span class=\"rvstore\">Cafe Bazaar<\u002Fspan><span class=\"rvstars\">★★☆☆☆<\u002Fspan><\u002Fdiv>\n<p class=\"rvq\">\"Why can't I scan or upload the receipt, or have it split automatically? I type every amount by hand and it takes forever.\"<\u002Fp>\n<\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"140\" class=\"rvcard\">\n<div class=\"rvtop\"><span class=\"rvstore\">Koocheh<\u002Fspan><span class=\"rvstars\">★★★☆☆<\u002Fspan><\u002Fdiv>\n<p class=\"rvq\">\"I wish it would remind people to pay automatically instead of me having to chase everyone myself.\"<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- USER INTERVIEWS -->\n<section id=\"interviews\" class=\"sec\">\n<div data-reveal=\"\" style=\"margin-bottom:28px\">\n<span class=\"lbl\" style=\"color:#34D399\">User research · In-depth interviews<\u002Fspan>\n<h2 class=\"h2\" data-comment-anchor=\"736d5532cf-h3\">Voices From Real Dong Users<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:12px;max-width:82ch\">We sat down with active Dong users for in-depth, semi-structured conversations — moving from everyday money habits to the exact moments Dong let them down. We deliberately avoided leading questions and let their own words tell the story.<\u002Fp>\n<\u002Fdiv>\n<div class=\"qwall\">\n<div data-reveal=\"\" class=\"qcard\" style=\"border-left:3px solid #7EB3F5\">\n<span class=\"qmark\">“<\u002Fspan>\n<p class=\"qtext\">If I could just scan the receipt and have it split automatically, I'd use Dong for absolutely everything.<\u002Fp>\n<div class=\"qwho\"><span class=\"qdot\"><\u002Fspan><span class=\"qrole\">No receipt scanning<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" class=\"qcard\" style=\"border-left:3px solid #E05A7A\">\n<span class=\"qmark\">“<\u002Fspan>\n<p class=\"qtext\" data-comment-anchor=\"e35d91f157-p\">The moment one person pays, the amount locks. If I typed it in wrong, there's no way left to correct it.<\u002Fp>\n<div class=\"qwho\"><span class=\"qdot\"><\u002Fspan><span class=\"qrole\">Locked after first payment<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" class=\"qcard\" style=\"border-left:3px solid #34D399\">\n<span class=\"qmark\">“<\u002Fspan>\n<p class=\"qtext\">Half my friends don't have Blu, so we end up back on WhatsApp doing the math by hand. It defeats the point.<\u002Fp>\n<div class=\"qwho\" data-comment-anchor=\"9dbb5aab52-div\"><span class=\"qdot\"><\u002Fspan><span class=\"qrole\">Blu-only barrier<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" class=\"qcard\" style=\"border-left:3px solid #F59E0B\">\n<span class=\"qmark\">“<\u002Fspan>\n<p class=\"qtext\">We didn't all order the same thing. Splitting everything equally just isn't fair — I want to choose how it's divided.<\u002Fp>\n<div class=\"qwho\"><span class=\"qdot\"><\u002Fspan><span class=\"qrole\">Only equal splits<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" class=\"qcard\" style=\"border-left:3px solid #7EB3F5\">\n<span class=\"qmark\">“<\u002Fspan>\n<p class=\"qtext\" data-comment-anchor=\"5900d74c59-p\">Whoever creates the group is stuck as admin forever — even after the trip's over, no one else can manage it.<\u002Fp>\n<div class=\"qwho\"><span class=\"qdot\" data-comment-anchor=\"b359f717f5-span\"><\u002Fspan><span class=\"qrole\">Admin can't be handed off<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div data-reveal=\"\" class=\"qcard\" style=\"border-left:3px solid #E05A7A\" data-comment-anchor=\"0bcfe43487-div\">\n<span class=\"qmark\">“<\u002Fspan>\n<p class=\"qtext\">Reminding a friend to pay me back feels awkward every time. I'd much rather the app did it quietly for me.<\u002Fp>\n<div class=\"qwho\"><span class=\"qdot\"><\u002Fspan><span class=\"qrole\">No smart reminders<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<div data-reveal=\"\" style=\"margin-top:40px;margin-bottom:18px\">\n<span class=\"lbl\">Synthesis · 3 key insights<\u002Fspan>\n<h2 class=\"h2\" style=\"font-size:24px\">What the interviews converged on<\u002Fh2>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n<article data-reveal=\"\" class=\"card\" style=\"display:flex;flex-direction:column\">\n<span style=\"font-size:22px;margin-bottom:12px\">🤝<\u002Fspan>\n<h3 style=\"font-weight:700;font-size:17px;margin:0 0 9px;line-height:1.3\">Trust Is Built on Transparency<\u002Fh3>\n<p style=\"font-size:13.5px;color:#9AA3B4;margin:0 0 16px;line-height:1.55\">Users don't just want to track who paid — they need proof of what was spent to feel comfortable settling. Without receipts, trust erodes; without history after settlement, accountability disappears.<\u002Fp>\n<p class=\"qt\" style=\"margin-top:auto;border-left:2px solid #7EB3F5;padding-left:14px\" data-comment-anchor=\"457bfe276d-p\">\"If I could just scan the receipt instead of typing every amount, I'd trust the total every time.\"<\u002Fp>\n<\u002Farticle>\n<article data-reveal=\"\" data-reveal-delay=\"80\" class=\"card\" style=\"display:flex;flex-direction:column\" data-comment-anchor=\"d23e15b663-article\">\n<span style=\"font-size:22px;margin-bottom:12px\">⚖️<\u002Fspan>\n<h3 style=\"font-weight:700;font-size:17px;margin:0 0 9px;line-height:1.3\">Flexibility Is a Fairness Issue<\u002Fh3>\n<p style=\"font-size:13.5px;color:#9AA3B4;margin:0 0 16px;line-height:1.55\">Equal-only and manual-only splits don't reflect real social dynamics. Income differences, partial attendance, and disputed amounts mean users need percentage splits and selective settlement.<\u002Fp>\n<p class=\"qt\" style=\"margin-top:auto;border-left:2px solid #34D399;padding-left:14px\">\"We didn't all order the same thing — splitting everything equally just isn't fair.\"<\u002Fp>\n<\u002Farticle>\n<article data-reveal=\"\" data-reveal-delay=\"160\" class=\"card\" style=\"display:flex;flex-direction:column\">\n<span style=\"font-size:22px;margin-bottom:12px\">💔<\u002Fspan>\n<h3 style=\"font-weight:700;font-size:17px;margin:0 0 9px;line-height:1.3\">Friction Damages Relationships<\u002Fh3>\n<p style=\"font-size:13.5px;color:#9AA3B4;margin:0 0 16px;line-height:1.55\">Per-transaction manual reminders aren't just inconvenient — they create social friction. Users avoid the feature rather than risk awkward follow-ups. Smart consolidated reminders would normalize the behavior.<\u002Fp>\n<p class=\"qt\" style=\"margin-top:auto;border-left:2px solid #E05A7A;padding-left:14px\" data-comment-anchor=\"62ad074968-p\">\"Reminding a friend to pay me back feels awkward — I'd rather the app did it quietly for me.\"<\u002Fp>\n<\u002Farticle>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- HEURISTIC EVALUATION -->\n<section id=\"heuristics\" class=\"sec\">\n<div data-reveal=\"\" style=\"margin-bottom:26px\">\n<span class=\"lbl\" style=\"color:#F59E0B\">Heuristic evaluation · Nielsen's 10<\u002Fspan>\n<h2 class=\"h2\">Systematic Usability Audit<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:12px;max-width:80ch\" data-comment-anchor=\"a2ff43cf17-p\">66 questions across all Dong screens. Severity scale 0–4 · Priority Score = Issues Found × Avg Severity.<\u002Fp>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n<div data-reveal=\"\" class=\"card\" style=\"text-align:center\"><div class=\"stat\" style=\"color:#F59E0B\"><span data-count=\"46.9\" data-decimals=\"1\" data-suffix=\"%\">46.9%<\u002Fspan><\u002Fdiv><div class=\"muted\" style=\"margin-top:8px;font-size:13.5px\">Pass rate<\u002Fdiv><\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"80\" class=\"card\" style=\"text-align:center\"><div class=\"stat\" style=\"color:#E05A7A\"><span data-count=\"35\">35<\u002Fspan><\u002Fdiv><div class=\"muted\" style=\"margin-top:8px;font-size:13.5px\">Issues found<\u002Fdiv><\u002Fdiv>\n<div data-reveal=\"\" data-reveal-delay=\"160\" class=\"card\" style=\"text-align:center;animation:catPulse 2.4s ease-out infinite;border-color:rgba(224,90,122,.3)\"><div class=\"stat\" style=\"color:#E05A7A\"><span data-count=\"3\">3<\u002Fspan><\u002Fdiv><div class=\"muted\" style=\"margin-top:8px;font-size:13.5px\">Catastrophic · Sev 4<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<div data-reveal=\"\" style=\"margin-top:26px;position:relative;background:#11151C;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:26px 26px 20px\">\n<div style=\"display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:20px\">\n<h3 style=\"font-weight:700;font-size:17px;margin:0\">Priority Score per Heuristic<\u002Fh3>\n<span class=\"muted\" style=\"font-size:12.5px\">Hover a bar for detail · H7 dominates the chart<\u002Fspan>\n<\u002Fdiv>\n<div data-bars=\"\"><\u002Fdiv>\n<div data-bars-tip=\"\" style=\"position:absolute;pointer-events:none;opacity:0;transition:opacity .14s;z-index:9;background:rgba(10,12,18,.97);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;min-width:178px;box-shadow:0 14px 36px -10px rgba(0,0,0,.8)\"><\u002Fdiv>\n<div style=\"display:flex;flex-wrap:wrap;gap:18px;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)\">\n<span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#9AA3B4\"><span style=\"width:12px;height:12px;border-radius:3px;background:#5B6678\"><\u002Fspan>0–3 low<\u002Fspan>\n<span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#9AA3B4\"><span style=\"width:12px;height:12px;border-radius:3px;background:#F59E0B\"><\u002Fspan>3–8 elevated<\u002Fspan>\n<span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#9AA3B4\"><span style=\"width:12px;height:12px;border-radius:3px;background:rgba(224,90,122,.7)\"><\u002Fspan>8–15 high<\u002Fspan>\n<span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#9AA3B4\"><span style=\"width:12px;height:12px;border-radius:3px;background:#E05A7A;box-shadow:0 0 8px #E05A7A\"><\u002Fspan>15+ critical<\u002Fspan>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- top 3 -->\n<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px\">\n<article data-reveal=\"\" class=\"card\" style=\"border-left:3px solid #E05A7A\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px\"><h3 style=\"font-weight:700;font-size:16px;margin:0\">H7 · Flexibility &amp; Efficiency<\u002Fh3><span style=\"font-family:'Inter';font-weight:800;font-size:20px;color:#E05A7A;font-variant-numeric:tabular-nums\">24.2<\u002Fspan><\u002Fdiv>\n<div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px\"><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(224,90,122,.12);color:#E8829B\">10 issues<\u002Fspan><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.04);color:#AEB7C4\">Avg sev 2.42<\u002Fspan><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(224,90,122,.12);color:#E8829B\">16.7% pass<\u002Fspan><\u002Fdiv>\n<ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px\">\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#E05A7A\">·<\u002Fspan>No percentage-based splitting<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#E05A7A\">·<\u002Fspan>No batch debt payment · no receipt upload<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#E05A7A\">·<\u002Fspan>Blu-only barrier &amp; locked admin (Sev 4)<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#E05A7A\">·<\u002Fspan>Per-transaction reminders, no categorization<\u002Fli>\n<\u002Ful>\n<\u002Farticle>\n<article data-reveal=\"\" data-reveal-delay=\"80\" class=\"card\" style=\"border-left:3px solid rgba(224,90,122,.7)\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px\"><h3 style=\"font-weight:700;font-size:16px;margin:0\">H3 · User Control &amp; Freedom<\u002Fh3><span style=\"font-family:'Inter';font-weight:800;font-size:20px;color:#E8829B;font-variant-numeric:tabular-nums\">8.7<\u002Fspan><\u002Fdiv>\n<div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px\"><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(224,90,122,.1);color:#E8829B\">4 issues<\u002Fspan><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.04);color:#AEB7C4\">Avg sev 2.17<\u002Fspan><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(245,158,11,.12);color:#F6B44B\">33.3% pass<\u002Fspan><\u002Fdiv>\n<ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px\">\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#E8829B\">·<\u002Fspan>Admin rights can't be transferred (Sev 4)<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#E8829B\">·<\u002Fspan>Transaction locks once any member pays<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#E8829B\">·<\u002Fspan>PWA invite has no guided path on iPhone<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#E8829B\">·<\u002Fspan>Edit/delete errors only at submit<\u002Fli>\n<\u002Ful>\n<\u002Farticle>\n<article data-reveal=\"\" data-reveal-delay=\"160\" class=\"card\" style=\"border-left:3px solid #F59E0B\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px\"><h3 style=\"font-weight:700;font-size:16px;margin:0\">H10 · Help &amp; Documentation<\u002Fh3><span style=\"font-family:'Inter';font-weight:800;font-size:20px;color:#F6B44B;font-variant-numeric:tabular-nums\">8.0<\u002Fspan><\u002Fdiv>\n<div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px\"><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(245,158,11,.1);color:#F6B44B\">4 issues<\u002Fspan><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.04);color:#AEB7C4\">Avg sev 2.0<\u002Fspan><span style=\"font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(224,90,122,.12);color:#E8829B\">20% pass<\u002Fspan><\u002Fdiv>\n<ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px\">\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#F6B44B\">·<\u002Fspan>No onboarding for first-time Dong users<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#F6B44B\">·<\u002Fspan>PWA workaround completely undocumented<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#F6B44B\">·<\u002Fspan>Help icon leads to generic BluLine<\u002Fli>\n<li style=\"display:flex;gap:8px;font-size:12.5px;color:#9AA3B4;line-height:1.45\"><span style=\"color:#F6B44B\">·<\u002Fspan>No contextual help on the split screen<\u002Fli>\n<\u002Ful>\n<\u002Farticle>\n<\u002Fdiv>\n\n<!-- table -->\n<div data-reveal=\"\" style=\"margin-top:34px;margin-bottom:16px\">\n<h3 style=\"font-weight:700;font-size:20px;margin:0 0 6px\">Full Evaluation Table<\u002Fh3>\n<p class=\"muted\" style=\"font-size:13.5px;margin:0\">Click a column header to sort · click any row to expand its individual check questions.<\u002Fp>\n<\u002Fdiv>\n<div data-reveal=\"\" style=\"background:#11151C;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden\">\n<div style=\"overflow-x:auto\">\n<table class=\"htbl\" data-htable=\"\" style=\"width:100%;border-collapse:collapse;min-width:740px;font-size:14px\">\n<thead>\n<tr style=\"background:rgba(255,255,255,.02)\">\n<th data-sort=\"name\" style=\"text-align:left;padding:14px 18px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#8892A4;cursor:pointer;white-space:nowrap\">Heuristic<\u002Fth>\n<th data-sort=\"total\" style=\"text-align:center;padding:14px 10px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#8892A4;cursor:pointer\">Total<\u002Fth>\n<th data-sort=\"pass\" style=\"text-align:center;padding:14px 10px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#8892A4;cursor:pointer\">Pass<\u002Fth>\n<th data-sort=\"fail\" style=\"text-align:center;padding:14px 10px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#8892A4;cursor:pointer\">Fail<\u002Fth>\n<th data-sort=\"partial\" style=\"text-align:center;padding:14px 10px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#8892A4;cursor:pointer\">Partial<\u002Fth>\n<th data-sort=\"passrate\" style=\"text-align:center;padding:14px 10px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#8892A4;cursor:pointer\">Pass&nbsp;%<\u002Fth>\n<th data-sort=\"avgsev\" style=\"text-align:center;padding:14px 10px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#8892A4;cursor:pointer\">Avg&nbsp;Sev<\u002Fth>\n<th data-sort=\"priority\" style=\"text-align:center;padding:14px 18px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#8892A4;cursor:pointer\">Priority<\u002Fth>\n<\u002Ftr>\n<\u002Fthead>\n<tbody data-htbody=\"\"><\u002Ftbody>\n<tfoot>\n<tr style=\"border-top:2px solid rgba(255,255,255,.1);background:rgba(126,179,245,.04)\">\n<td style=\"padding:14px 18px;font-weight:700\">Total<\u002Ftd>\n<td style=\"text-align:center;padding:14px 10px;font-weight:600;font-variant-numeric:tabular-nums\">66<\u002Ftd>\n<td style=\"text-align:center;padding:14px 10px;font-weight:600;color:#34D399;font-variant-numeric:tabular-nums\">31<\u002Ftd>\n<td style=\"text-align:center;padding:14px 10px;font-weight:600;color:#E05A7A;font-variant-numeric:tabular-nums\">21<\u002Ftd>\n<td style=\"text-align:center;padding:14px 10px;font-weight:600;color:#F59E0B;font-variant-numeric:tabular-nums\">14<\u002Ftd>\n<td style=\"text-align:center;padding:14px 10px;font-weight:700;font-variant-numeric:tabular-nums\">46.9%<\u002Ftd>\n<td style=\"text-align:center;padding:14px 10px;font-weight:600;font-variant-numeric:tabular-nums\">1.18<\u002Ftd>\n<td style=\"text-align:center;padding:14px 18px;font-weight:700;color:var(--blu,#7EB3F5);font-variant-numeric:tabular-nums\">57.7<\u002Ftd>\n<\u002Ftr>\n<\u002Ftfoot>\n<\u002Ftable>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- CRITICAL FINDINGS -->\n<section class=\"sec\">\n<div data-reveal=\"\" style=\"margin-bottom:24px\">\n<span class=\"lbl red\">Critical issues · the problems that hold Dong back<\u002Fspan>\n<h2 class=\"h2\">Three Problems Standing in Users' Way<\u002Fh2>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n<article data-reveal=\"\" data-reveal-delay=\"160\" class=\"card\" style=\"border:1px solid rgba(224,90,122,.26);background:linear-gradient(165deg,rgba(224,90,122,.09),#161B27 55%);display:flex;flex-direction:column;order:3\" data-comment-anchor=\"c18f77690d-article\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px\"><span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:rgba(224,90,122,.16);color:#E8829B;border:1px solid rgba(224,90,122,.3)\">⚠ High priority<\u002Fspan><span class=\"muted\" style=\"font-size:11.5px\">H7<\u002Fspan><\u002Fdiv>\n<h3 style=\"font-weight:700;font-size:19px;line-height:1.25;margin:0 0 10px\">Blu-Only Account Requirement<\u002Fh3>\n<p style=\"font-size:13.5px;color:#A4ADBA;margin:0 0 14px;line-height:1.55\">All group members must have a BluBank account; non-Blu users cannot participate. People must convince friends and family to open a Blu account just to split shared expenses — a barrier raised across every interview and repeated in app-store reviews.<\u002Fp>\n<div style=\"margin-top:auto;padding-top:14px;border-top:1px solid rgba(224,90,122,.18)\"><span class=\"lbl red\" style=\"margin-bottom:6px\">Real-world impact<\u002Fspan><p style=\"margin:0;font-size:13px;color:#C7CDD6;line-height:1.5\">Groups default to WhatsApp + manual calculation, defeating the feature's purpose.<\u002Fp><\u002Fdiv>\n<\u002Farticle>\n<article data-reveal=\"\" class=\"card\" style=\"border:1px solid rgba(224,90,122,.26);background:linear-gradient(165deg,rgba(224,90,122,.09),#161B27 55%);display:flex;flex-direction:column\" data-comment-anchor=\"9219377866-article\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px\"><span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:rgba(224,90,122,.16);color:#E8829B;border:1px solid rgba(224,90,122,.3)\">⚠ High priority<\u002Fspan><span class=\"muted\" style=\"font-size:11.5px\">H7<\u002Fspan><\u002Fdiv>\n<h3 style=\"font-weight:700;font-size:19px;line-height:1.25;margin:0 0 10px\">Only Equal &amp; Manual Splits<\u002Fh3>\n<p style=\"font-size:13.5px;color:#A4ADBA;margin:0 0 14px;line-height:1.55\">Dong only lets you divide a bill equally or type each amount by hand. Groups need more ways to split — by percentage, by custom share, or itemized per person — so the result actually matches what each person owes.<\u002Fp>\n<div style=\"margin-top:auto;padding-top:14px;border-top:1px solid rgba(224,90,122,.18)\"><span class=\"lbl red\" style=\"margin-bottom:6px\">Real-world impact<\u002Fspan><p style=\"margin:0;font-size:13px;color:#C7CDD6;line-height:1.5\">People do the math themselves or argue over the total, then stop using the feature.<\u002Fp><\u002Fdiv>\n<\u002Farticle>\n<article data-reveal=\"\" data-reveal-delay=\"80\" class=\"card\" style=\"border:1px solid rgba(224,90,122,.26);background:linear-gradient(165deg,rgba(224,90,122,.09),#161B27 55%);display:flex;flex-direction:column\">\n<div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px\"><span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:rgba(224,90,122,.16);color:#E8829B;border:1px solid rgba(224,90,122,.3)\">⚠ High priority<\u002Fspan><span class=\"muted\" style=\"font-size:11.5px\">H7<\u002Fspan><\u002Fdiv>\n<h3 style=\"font-weight:700;font-size:19px;line-height:1.25;margin:0 0 10px\">No Receipt Scanning, Upload, or Comments<\u002Fh3>\n<p style=\"font-size:13.5px;color:#A4ADBA;margin:0 0 14px;line-height:1.55\">An expense can't be scanned in, backed up with an uploaded receipt, or explained with a comment. Members can't see what a charge was actually for or add context, so every unclear amount turns into a question.<\u002Fp>\n<div style=\"margin-top:auto;padding-top:14px;border-top:1px solid rgba(224,90,122,.18)\"><span class=\"lbl red\" style=\"margin-bottom:6px\">Real-world impact<\u002Fspan><p style=\"margin:0;font-size:13px;color:#C7CDD6;line-height:1.5\">Without proof or context, people delay paying and trust in the shared total breaks down.<\u002Fp><\u002Fdiv>\n<\u002Farticle>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- SYNTHESIS -->\n<section id=\"synthesis\" class=\"sec\">\n<div data-reveal=\"\" style=\"margin-bottom:26px\">\n<span class=\"lbl\">Synthesis<\u002Fspan>\n<h2 class=\"h2\">Three Research Methods. One Consistent Signal.<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:12px;max-width:78ch\">Every method we ran converges on the same three underlying problems — trust, flexibility, and access.<\u002Fp>\n<\u002Fdiv>\n<div data-reveal=\"\" style=\"overflow-x:auto\">\n<table class=\"mx\" style=\"width:100%;border-collapse:collapse;min-width:760px\">\n<thead><tr><th><\u002Fth><th>Desk Research<\u002Fth><th>User Interviews<\u002Fth><th>Heuristic Evaluation<\u002Fth><\u002Ftr><\u002Fthead>\n<tbody>\n<tr><td class=\"rh\">Trust &amp; Transparency<\u002Ftd><td class=\"cell\" data-comment-anchor=\"2f4664751c-td\">Cafe Bazaar: \"No way to scan, upload, or auto-split a receipt — I type every amount by hand\"<\u002Ftd><td class=\"cell\">TG: \"If I could just scan the receipt instead of typing every amount\"<\u002Ftd><td class=\"cell\">H7 — no receipt scan or upload <b style=\"color:#E8829B\">(Sev 3)<\u002Fb><\u002Ftd><\u002Ftr>\n<tr><td class=\"rh\">Flexibility Gap<\u002Ftd><td class=\"cell\" data-comment-anchor=\"5c8833b88b-td\">Cafe Bazaar: \"I have to type every single amount by hand\"<\u002Ftd><td class=\"cell\">DH: \"Splitting everything equally just isn't fair\"<\u002Ftd><td class=\"cell\">H7 — no percentage split <b style=\"color:#E8829B\">(Sev 3)<\u002Fb><\u002Ftd><\u002Ftr>\n<tr><td class=\"rh\">Access Barrier<\u002Ftd><td class=\"cell\">Myket: \"Everyone has to have Blu — most of my friends don't\"<\u002Ftd><td class=\"cell\">FD: \"Half my friends don't have Blu\"<\u002Ftd><td class=\"cell\">H7 — Blu-only barrier <b style=\"color:#E05A7A\">(Sev 4)<\u002Fb><\u002Ftd><\u002Ftr>\n<\u002Ftbody>\n<\u002Ftable>\n<\u002Fdiv>\n<div data-reveal=\"\" style=\"margin-top:22px;background:linear-gradient(120deg,rgba(126,179,245,.1),rgba(126,179,245,.02));border:1px solid rgba(126,179,245,.22);border-left:3px solid var(--blu,#7EB3F5);border-radius:12px;padding:26px 30px\">\n<span class=\"lbl\" style=\"color:var(--blu,#7EB3F5);margin-bottom:10px\">Problem statement<\u002Fspan>\n<p style=\"margin:0;font-size:19px;font-weight:600;line-height:1.5;letter-spacing:-.005em\">Dong users need a trustworthy, flexible expense-splitting experience that works across their social network — regardless of which bank their friends use. Today, the Blu-only payment requirement, the absence of flexible split options, and the lack of smart reminders prevent it from becoming the default tool for group finances.<\u002Fp>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHAT'S NEXT -->\n<section class=\"sec\">\n<div data-reveal=\"\" style=\"margin-bottom:22px\">\n<span class=\"lbl\">Next phases<\u002Fspan>\n<h2 class=\"h2\">What's Next<\u002Fh2>\n<p class=\"lead\" style=\"margin-top:12px;max-width:66ch\">The research phase is complete. Here's the roadmap from here.<\u002Fp>\n<\u002Fdiv>\n<div data-reveal=\"\" class=\"card\" style=\"background:#11151C\">\n<div style=\"display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px dashed rgba(126,179,245,.3)\">\n<span style=\"flex:none;width:30px;height:30px;border-radius:50%;background:#34D399;display:grid;place-items:center;font-size:14px;color:#0F1117;font-weight:800\">✓<\u002Fspan>\n<div><div style=\"font-weight:700;font-size:15px;color:#86E3C2\">You are here — Research Complete<\u002Fdiv><div class=\"muted\" style=\"font-size:13px\">Desk Research · User Interviews · Heuristic Evaluation<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"rdmrow\"><span class=\"node\">4<\u002Fspan><div><div style=\"font-weight:600;font-size:15px\">Competitive deep-dive analysis<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"rdmrow\" style=\"border-top:1px solid rgba(255,255,255,.05)\"><span class=\"node\">5<\u002Fspan><div><div style=\"font-weight:600;font-size:15px\">Problem statement refinement + How Might We framing<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"rdmrow\" style=\"border-top:1px solid rgba(255,255,255,.05)\"><span class=\"node\">6<\u002Fspan><div><div style=\"font-weight:600;font-size:15px\">Ideation — Crazy 8s, sketching<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"rdmrow\" style=\"border-top:1px solid rgba(255,255,255,.05)\"><span class=\"node\">7<\u002Fspan><div><div style=\"font-weight:600;font-size:15px\">Wireframing<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"rdmrow\" style=\"border-top:1px solid rgba(255,255,255,.05)\"><span class=\"node\">8<\u002Fspan><div><div style=\"font-weight:600;font-size:15px\">Prototyping<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"rdmrow\" style=\"border-top:1px solid rgba(255,255,255,.05)\"><span class=\"node\">9<\u002Fspan><div><div style=\"font-weight:600;font-size:15px\">Usability testing<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<footer data-reveal=\"\" style=\"margin-top:80px;padding-top:26px;border-top:1px solid rgba(255,255,255,.06);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px\">\n<div style=\"display:flex;align-items:center;gap:10px\"><img src=\"assets/img-01.png\" alt=\"\" width=\"26\" height=\"26\" style=\"width:26px;height:26px;border-radius:8px\"><span class=\"muted\" style=\"font-size:13.5px\">Shared Money Hub · UX Research Case Study<\u002Fspan><\u002Fdiv>\n<span class=\"muted\" style=\"font-size:13px\">Parisa Nasri · Farnaz Toghiani · Mahdis Salaari · Arin Hacoupian · Jun 2026<\u002Fspan>\n<\u002Ffooter>\n\n<\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#7EB3F5&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#7EB3F5&quot;,&quot;#34D399&quot;,&quot;#E05A7A&quot;,&quot;#F59E0B&quot;]},&quot;enableReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;enableCounters&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return { accent: this.props.accent || '#7EB3F5' };\n  }\n\n  componentDidMount() {\n    this.root = document.querySelector('[data-blu-root]');\n    if (!this.root) return;\n    const reveal = this.props.enableReveal !== false;\n    const counters = this.props.enableCounters !== false;\n\n    const bar = this.root.querySelector('[data-progress]');\n    this._onScroll = () => {\n      const h = document.documentElement;\n      const max = h.scrollHeight - h.clientHeight;\n      if (bar) bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n\n    const els = [...this.root.querySelectorAll('[data-reveal]')];\n    if (reveal) {\n      els.forEach((el) => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(20px)';\n        el.style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)';\n      });\n      const io = new IntersectionObserver((ents) => {\n        ents.forEach((e) => {\n          if (e.isIntersecting) {\n            const el = e.target;\n            const d = parseInt(el.dataset.revealDelay || '0', 10);\n            setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'none'; }, d);\n            io.unobserve(el);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\n      els.forEach((el) => io.observe(el));\n      this._revealFallback = setTimeout(() => els.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; }), 3000);\n    }\n\n    if (counters) {\n      const fmt = (n) => n.toLocaleString('en-US');\n      const run = (el) => {\n        const target = parseFloat(el.dataset.count);\n        const pre = el.dataset.prefix || '';\n        const suf = el.dataset.suffix || '';\n        const dec = parseInt(el.dataset.decimals || '0', 10);\n        const dur = 1300, start = performance.now();\n        const tick = (t) => {\n          const p = Math.min(1, (t - start) / dur);\n          const e = 1 - Math.pow(1 - p, 3);\n          const raw = target * e;\n          const v = dec > 0 ? raw.toFixed(dec) : fmt(Math.round(raw));\n          el.textContent = pre + v + suf;\n          if (p < 1) requestAnimationFrame(tick);\n        };\n        requestAnimationFrame(tick);\n      };\n      const cio = new IntersectionObserver((ents) => {\n        ents.forEach((e) => { if (e.isIntersecting) { run(e.target); cio.unobserve(e.target); } });\n      }, { threshold: 0.5 });\n      this.root.querySelectorAll('[data-count]').forEach((el) => cio.observe(el));\n    }\n\n    this.wireFilters();\n    this.buildBars();\n    this.buildTable();\n    this.wireNav();\n  }\n\n  heurData() {\n    return [\n      { h:'H1', name:'Visibility of System Status', total:9, pass:5, fail:2, partial:2, passrate:55.6, avgsev:1.0, priority:4.0, issues:4 },\n      { h:'H2', name:'Match — System & Real World', total:5, pass:3, fail:0, partial:2, passrate:60.0, avgsev:0.4, priority:0.8, issues:2 },\n      { h:'H3', name:'User Control & Freedom', total:6, pass:2, fail:3, partial:1, passrate:33.3, avgsev:2.17, priority:8.7, issues:4 },\n      { h:'H4', name:'Consistency & Standards', total:5, pass:5, fail:0, partial:0, passrate:100, avgsev:0.0, priority:0.0, issues:0 },\n      { h:'H5', name:'Error Prevention', total:8, pass:4, fail:2, partial:2, passrate:50.0, avgsev:1.25, priority:5.0, issues:4 },\n      { h:'H6', name:'Recognition Rather Than Recall', total:6, pass:5, fail:1, partial:0, passrate:83.3, avgsev:0.33, priority:0.3, issues:1 },\n      { h:'H7', name:'Flexibility & Efficiency', total:12, pass:2, fail:9, partial:1, passrate:16.7, avgsev:2.42, priority:24.2, issues:10 },\n      { h:'H8', name:'Aesthetic & Minimalist Design', total:6, pass:3, fail:0, partial:3, passrate:50.0, avgsev:0.5, priority:1.5, issues:3 },\n      { h:'H9', name:'Help Users Recognize Errors', total:4, pass:1, fail:1, partial:2, passrate:25.0, avgsev:1.75, priority:5.3, issues:3 },\n      { h:'H10', name:'Help & Documentation', total:5, pass:1, fail:3, partial:1, passrate:20.0, avgsev:2.0, priority:8.0, issues:4 },\n    ];\n  }\n\n  barColor(p) {\n    if (p >= 15) return { fill: '#E05A7A', glow: true };\n    if (p >= 8) return { fill: 'rgba(224,90,122,.7)', glow: false };\n    if (p >= 3) return { fill: '#F59E0B', glow: false };\n    return { fill: '#5B6678', glow: false };\n  }\n\n  buildBars() {\n    const host = this.root.querySelector('[data-bars]');\n    const tip = this.root.querySelector('[data-bars-tip]');\n    if (!host) return;\n    const data = this.heurData().slice().sort((a, b) => b.priority - a.priority);\n    const max = 24.2;\n    host.innerHTML = '';\n    const fills = [];\n    data.forEach((d) => {\n      const c = this.barColor(d.priority);\n      const pct = Math.max(1.5, (d.priority / max) * 100);\n      const row = document.createElement('div');\n      row.className = 'barrow';\n      row.innerHTML =\n        '<div class=\"barlbl\"><b>' + d.h + '<\u002Fb>' + d.name + '<\u002Fdiv>'\n        + '<div class=\"bartrack\"><div class=\"barfill\" style=\"background:' + c.fill + ';' + (c.glow ? 'box-shadow:0 0 14px ' + c.fill + ';' : '') + '\"><\u002Fdiv><\u002Fdiv>'\n        + '<div class=\"barval\" style=\"color:' + (d.priority >= 8 ? '#E8829B' : d.priority >= 3 ? '#F6B44B' : '#9AA3B4') + '\">' + d.priority.toFixed(1) + '<\u002Fdiv>';\n      const fill = row.querySelector('.barfill');\n      fill._pct = pct;\n      fills.push(fill);\n      const show = (ev) => {\n        if (!tip) return;\n        const pc = d.passrate >= 70 ? '#34D399' : d.passrate >= 40 ? '#F59E0B' : '#E8829B';\n        tip.innerHTML = '<div style=\"font-weight:700;font-size:13px;color:#E7ECF2;margin-bottom:7px\">' + d.h + ' · ' + d.name + '<\u002Fdiv>'\n          + '<div style=\"display:flex;justify-content:space-between;gap:16px;font-size:12px;color:#9AA3B4;line-height:1.8\"><span>Pass rate<\u002Fspan><b style=\"color:' + pc + '\">' + d.passrate + '%<\u002Fb><\u002Fdiv>'\n          + '<div style=\"display:flex;justify-content:space-between;gap:16px;font-size:12px;color:#9AA3B4;line-height:1.8\"><span>Issues found<\u002Fspan><b style=\"color:#7EB3F5\">' + d.issues + '<\u002Fb><\u002Fdiv>'\n          + '<div style=\"display:flex;justify-content:space-between;gap:16px;font-size:12px;color:#9AA3B4;line-height:1.8\"><span>Avg severity<\u002Fspan><b style=\"color:#E7ECF2\">' + d.avgsev.toFixed(2) + '<\u002Fb><\u002Fdiv>'\n          + '<div style=\"display:flex;justify-content:space-between;gap:16px;font-size:12px;color:#9AA3B4;line-height:1.8;border-top:1px solid rgba(255,255,255,.1);margin-top:5px;padding-top:5px\"><span>Priority<\u002Fspan><b style=\"color:#E8829B\">' + d.priority.toFixed(1) + '<\u002Fb><\u002Fdiv>';\n        const hb = host.getBoundingClientRect();\n        tip.style.left = Math.min(hb.width - 190, Math.max(0, ev.clientX - hb.left + 14)) + 'px';\n        tip.style.top = (ev.clientY - hb.top + 16) + 'px';\n        tip.style.opacity = '1';\n      };\n      row.addEventListener('mousemove', show);\n      row.addEventListener('mouseenter', show);\n      row.addEventListener('mouseleave', () => { if (tip) tip.style.opacity = '0'; });\n      host.appendChild(row);\n    });\n    let drawn = false;\n    const draw = () => {\n      if (drawn) return; drawn = true;\n      fills.forEach((f, i) => setTimeout(() => { f.style.width = f._pct + '%'; }, 80 + i * 55));\n    };\n    const io = new IntersectionObserver((ents) => {\n      ents.forEach((e) => { if (e.isIntersecting) { draw(); io.disconnect(); } });\n    }, { threshold: 0.18 });\n    io.observe(host);\n    this._barsFallback = setTimeout(draw, 2600);\n  }\n\n  buildTable() {\n    const tbody = this.root.querySelector('[data-htbody]');\n    if (!tbody) return;\n    this._tableData = this.heurData();\n    this._sortKey = null; this._sortDir = -1;\n    this._records = null;\n    fetch('./heuristic-data.json').then(r => r.json()).then(j => { this._records = j.records; }).catch(() => {});\n    this.renderTable();\n    this.root.querySelectorAll('th[data-sort]').forEach((th) => {\n      th.addEventListener('click', () => {\n        const k = th.dataset.sort;\n        if (this._sortKey === k) this._sortDir *= -1; else { this._sortKey = k; this._sortDir = (k === 'name') ? 1 : -1; }\n        this.renderTable();\n      });\n    });\n  }\n\n  passColor(p) { return p >= 70 ? '#34D399' : p >= 40 ? '#F59E0B' : '#E05A7A'; }\n\n  renderTable() {\n    const tbody = this.root.querySelector('[data-htbody]');\n    if (!tbody) return;\n    let rows = [...this._tableData];\n    if (this._sortKey) {\n      const k = this._sortKey, dir = this._sortDir;\n      rows.sort((a, b) => {\n        if (k === 'name') return (parseInt(a.h.slice(1)) - parseInt(b.h.slice(1))) * dir;\n        return (a[k] - b[k]) * dir;\n      });\n    }\n    this.root.querySelectorAll('th[data-sort]').forEach((th) => {\n      const base = th.textContent.replace(/[ ▲▼]+$/, '');\n      th.innerHTML = base + (this._sortKey === th.dataset.sort ? (this._sortDir > 0 ? ' ▲' : ' ▼') : '');\n      th.style.color = this._sortKey === th.dataset.sort ? '#E7ECF2' : '#8892A4';\n    });\n    tbody.innerHTML = '';\n    rows.forEach((d) => {\n      const pc = this.passColor(d.passrate);\n      const rowBg = d.passrate > 70 ? 'rgba(52,211,153,.045)' : d.passrate < 40 ? 'rgba(224,90,122,.05)' : '';\n      const tr = document.createElement('tr');\n      tr.setAttribute('data-h', d.h);\n      tr.style.borderTop = '1px solid rgba(255,255,255,.06)';\n      tr.style.transition = 'background .15s';\n      tr.style.background = rowBg;\n      tr._baseBg = rowBg;\n      tr.innerHTML =\n        '<td style=\"padding:13px 18px\"><span style=\"display:inline-flex;align-items:center;gap:10px\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:' + pc + ';box-shadow:0 0 8px ' + pc + '66\"><\u002Fspan><span><b style=\"font-weight:700;color:#E7ECF2\">' + d.h + '<\u002Fb> <span style=\"color:#9AA3B4;font-size:13px\">' + d.name + '<\u002Fspan><\u002Fspan><span data-caret style=\"margin-left:6px;color:#5C6473;font-size:11px;transition:transform .2s\">▶<\u002Fspan><\u002Fspan><\u002Ftd>'\n        + '<td style=\"text-align:center;padding:13px 10px;color:#AEB7C4;font-variant-numeric:tabular-nums\">' + d.total + '<\u002Ftd>'\n        + '<td style=\"text-align:center;padding:13px 10px;color:#34D399;font-variant-numeric:tabular-nums;font-weight:600\">' + d.pass + '<\u002Ftd>'\n        + '<td style=\"text-align:center;padding:13px 10px;color:' + (d.fail ? '#E05A7A' : '#5C6473') + ';font-variant-numeric:tabular-nums;font-weight:600\">' + d.fail + '<\u002Ftd>'\n        + '<td style=\"text-align:center;padding:13px 10px;color:' + (d.partial ? '#F59E0B' : '#5C6473') + ';font-variant-numeric:tabular-nums\">' + d.partial + '<\u002Ftd>'\n        + '<td style=\"text-align:center;padding:13px 10px\"><span style=\"display:inline-block;min-width:52px;padding:4px 0;border-radius:7px;font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums;color:' + pc + ';background:' + pc + '1a\">' + d.passrate + '%<\u002Fspan><\u002Ftd>'\n        + '<td style=\"text-align:center;padding:13px 10px;color:#AEB7C4;font-variant-numeric:tabular-nums\">' + d.avgsev.toFixed(2) + '<\u002Ftd>'\n        + '<td style=\"text-align:center;padding:13px 18px\"><b style=\"color:' + (d.priority >= 8 ? '#E05A7A' : d.priority >= 4 ? '#F59E0B' : '#9AA3B4') + ';font-variant-numeric:tabular-nums\">' + d.priority.toFixed(1) + '<\u002Fb><\u002Ftd>';\n      tr.addEventListener('mouseenter', () => { tr.style.background = 'rgba(255,255,255,.03)'; });\n      tr.addEventListener('mouseleave', () => { tr.style.background = tr._baseBg; });\n      tr.addEventListener('click', () => this.toggleRow(tr, d));\n      tbody.appendChild(tr);\n    });\n  }\n\n  toggleRow(tr, d) {\n    const next = tr.nextSibling;\n    const caret = tr.querySelector('[data-caret]');\n    if (next && next.hasAttribute && next.hasAttribute('data-expand')) {\n      next.remove();\n      if (caret) caret.style.transform = '';\n      return;\n    }\n    if (caret) caret.style.transform = 'rotate(90deg)';\n    const ex = document.createElement('tr');\n    ex.setAttribute('data-expand', d.h);\n    const td = document.createElement('td');\n    td.setAttribute('colspan', '8');\n    td.style.padding = '0';\n    td.style.background = 'rgba(255,255,255,.015)';\n    const recs = (this._records || []).filter(r => r.h === d.h);\n    const badge = (res) => {\n      const c = res === 'Pass' ? '#34D399' : res === 'Fail' ? '#E05A7A' : res === 'Partial' ? '#F59E0B' : '#8892A4';\n      return '<span style=\"flex:none;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:6px;color:' + c + ';background:' + c + '1a;border:1px solid ' + c + '33\">' + (res || '—') + '<\u002Fspan>';\n    };\n    let inner = '<div style=\"padding:6px 18px 18px;display:flex;flex-direction:column;gap:8px\">';\n    if (!recs.length) inner += '<div style=\"font-size:13px;color:#6B7484;padding:10px 0\">Loading check questions…<\u002Fdiv>';\n    recs.forEach((r) => {\n      inner += '<div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 14px;background:#0F1117;border:1px solid rgba(255,255,255,.05);border-radius:10px\">'\n        + '<span style=\"flex:none;font-size:11.5px;font-weight:600;color:#6B7484;min-width:34px;padding-top:2px\">' + r.id + '<\u002Fspan>'\n        + '<div style=\"flex:1;min-width:0\"><div style=\"font-size:13.5px;color:#D2D8E0;line-height:1.45\">' + this.esc(r.q) + '<\u002Fdiv>'\n        + (r.area ? '<div style=\"font-size:12px;color:#6B7484;margin-top:3px\">' + this.esc(r.area) + '<\u002Fdiv>' : '') + '<\u002Fdiv>'\n        + '<span style=\"flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:5px\">' + badge(r.result)\n        + (r.sev != null ? '<span style=\"font-size:11px;color:#8892A4\">sev ' + r.sev + '<\u002Fspan>' : '') + '<\u002Fspan><\u002Fdiv>';\n    });\n    inner += '<\u002Fdiv>';\n    td.innerHTML = inner;\n    ex.appendChild(td);\n    tr.parentNode.insertBefore(ex, tr.nextSibling);\n  }\n\n  esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;'); }\n\n  wireNav() {\n    const links = [...this.root.querySelectorAll('[data-navlink]')];\n    if (!links.length) return;\n    links.forEach((a) => {\n      a.addEventListener('click', (e) => {\n        e.preventDefault();\n        const id = a.getAttribute('href').slice(1);\n        const el = document.getElementById(id);\n        if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 70, behavior: 'smooth' });\n      });\n    });\n    const sections = links.map((a) => document.getElementById(a.getAttribute('href').slice(1))).filter(Boolean);\n    const setActive = (id) => {\n      links.forEach((a) => a.classList.toggle('on', a.getAttribute('href') === '#' + id));\n    };\n    const navIO = new IntersectionObserver((ents) => {\n      ents.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); });\n    }, { rootMargin: '-45% 0px -50% 0px' });\n    sections.forEach((s) => navIO.observe(s));\n  }\n\n  wireFilters() {\n    const chips = [...this.root.querySelectorAll('[data-filter]')];\n    const cards = [...this.root.querySelectorAll('[data-sev]')];\n    if (chips.length) {\n      const apply = (f) => {\n        chips.forEach((c) => {\n          const on = c.dataset.filter === f;\n          c.style.background = on ? 'var(--blu,#7EB3F5)' : 'transparent';\n          c.style.color = on ? '#0F1117' : '#C2CAD6';\n          c.style.borderColor = on ? 'var(--blu,#7EB3F5)' : 'rgba(255,255,255,.13)';\n          c.style.fontWeight = on ? '700' : '600';\n        });\n        cards.forEach((card) => {\n          const show = f === 'all' || card.dataset.sev === f;\n          card.style.display = show ? '' : 'none';\n        });\n      };\n      chips.forEach((c) => c.addEventListener('click', () => apply(c.dataset.filter)));\n      apply('all');\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._revealFallback) clearTimeout(this._revealFallback);\n    if (this._barsFallback) clearTimeout(this._barsFallback);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
